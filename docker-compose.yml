services:
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - db-network

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - db-network

  postgres:
    container_name: postgres-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network

  redis:
    container_name: redis
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    networks:
      - db-network

  
  payment-service:
    container_name: payment-service
    build:
      context: ./backend/payment-service # Path to where your Payment Service Dockerfile is
    ports:
      - "8082:8080"
    env_file:
      - ./backend/payment-service/.env
    networks:
      - db-network

  user-service:
    container_name: user-service
    build:
      context: ./backend/user-service
    ports:
      - "8081:8080" # Host 8081 -> Container 8080
    env_file:
      - ./backend/user-service/.env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - REDIS_HOST=redis
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      - postgres
      - kafka
      - redis   
    networks:
      - db-network

  api-gateway:
    container_name: api-gateway
    build:
      context: ./backend/api-gateway
    ports:
      - "8060:8060" 
    env_file:
      - ./backend/api-gateway/.env
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - REDIS_HOST=redis
      # CRITICAL: Point to the INTERNAL port 8080, not 8081
      - USER_SERVICE_URL=http://user-service:8080 
    depends_on:
      - user-service
      - redis
    networks:
      - db-network

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    networks:
      - db-network

  jenkins:
    user: root
    container_name: funkart-jenkins
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - gradle_cache:/root/.gradle
    networks:
      - db-network
    
networks:
  db-network:
    driver: bridge
    
volumes:
  jenkins_home:
  gradle_cache:
  postgres_data:   
  redis_data: