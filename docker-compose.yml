services:
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_SYNC_LIMIT: 2
      ZOOKEEPER_INIT_LIMIT: 5
    networks:
      - db-network

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - db-network

  postgres:
    container_name: postgres-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - db-network
      
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - db-network
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    container_name: user-service
    image: abbasgureitc/user-service:latest 
    pull_policy: always 
    env_file:
      - ./backend/user-service/.env
    ports:
      - "8081:8080" # Host 8081 -> Container 8080
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/mydb
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure:3

  payment-service:
    container_name: payment-service
    image: abbasgureitc/payment-service:latest
    pull_policy: always
    env_file:
      - ./backend/payment-service/.env
    ports:
      - "8082:8080" # Host 8082 -> Container 8080
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/mydb
    networks:
      - db-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure

  api-gateway:
    container_name: api-gateway
    image: abbasgureitc/api-gateway:latest
    pull_policy: always
    env_file:
      - ./backend/api-gateway/.env
    ports:
      - "8080:8080" # External Entry Point
    depends_on:
      user-service:
        condition: service_healthy # Wait for healthcheck, not just start
      payment-service:
        condition: service_healthy
    environment:
      # INTERNAL MAPPING: Use port 8080 because they are on the same network
      - USER_SERVICE_URL=http://user-service:8080
      - PAYMENT_SERVICE_URL=http://payment-service:8080
    networks:
      - db-network

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - db-network
    depends_on:
      kafka:
        condition: service_healthy
   
  jenkins:
    container_name: funkart-jenkins
    # Jenkins needs to stay as a build so it applies your custom Dockerfile
    build:
      context: .
      dockerfile: Dockerfile
    privileged: true
    user: root
    ports:
      - "8090:8080"
      - "50000:50000"
    environment:
      - GRADLE_USER_HOME=/root/.gradle
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - gradle_cache:/root/.gradle
      # Mount the whole project so Jenkins can see the subdirectories
      - .:/var/jenkins_home/workspace/funkart-pipeline
    networks:
      - db-network

volumes:
  jenkins_home:
  gradle_cache:

networks:
  db-network:
    driver: bridge