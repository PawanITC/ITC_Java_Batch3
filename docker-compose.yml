services:
  # --- 1. DATABASE & UI ---
  postgres:
    container_name: postgres-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db-network

  pgadmin:
    container_name: funkart-pgadmin
    image: dpage/pgadmin4
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@funkart.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - db-network

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - db-network

  # --- 2. KAFKA (KRaft Mode) ---
  kafka:
    container_name: kafka-kraft
    image: confluentinc/cp-kafka:7.5.0
    restart: always
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,OUTSIDE://0.0.0.0:9094,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - db-network

  kafka-ui:
    container_name: kafka-ui
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: funkart-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - db-network

  # --- 3. CI/CD ---
  jenkins:
    container_name: funkart-jenkins
    user: root
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - gradle_cache:/root/.gradle
    networks:
      - db-network

  # --- 4. MICROSERVICES ---
  # Note: Standardizing resource limits to protect the Host RAM
  api-gateway:
    container_name: api-gateway
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    env_file: ./backend/api-gateway/.env
    ports:
      - "8060:8060"
    depends_on:
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - db-network

  user-service:
    container_name: user-service
    build:
      context: .
      dockerfile: backend/user-service/Dockerfile
    env_file: ./backend/user-service/.env
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - db-network

  payment-service:
    container_name: payment-service
    build:
      context: .
      dockerfile: backend/payment-service/Dockerfile
    env_file: ./backend/payment-service/.env
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - db-network

  product-service:
    container_name: product-service
    build:
      context: .
      dockerfile: backend/product-service/Dockerfile
    env_file: ./backend/product-service/.env
    ports:
      - "8083:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M
    networks:
      - db-network

  order-service:
    container_name: order-service
    build:
      context: .
      dockerfile: backend/order-service/Dockerfile
    env_file: ./backend/order-service/.env
    ports:
      - "8084:8080" 
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M # Balanced for the JVM Heap + MetaSpace
    networks:
      - db-network

  # --- 5. OBSERVABILITY ---
  jaeger:
    container_name: jaeger
    image: jaegertracing/all-in-one:1.53
    restart: always
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - db-network

  loki:
    container_name: loki
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - db-network

  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - db-network

  grafana:
    container_name: grafana
    image: grafana/grafana:10.2.3
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
      - jaeger
      - prometheus
    networks:
      - db-network

  otel-collector:
    container_name: otel-collector
    image: otel/opentelemetry-collector-contrib:0.94.0
    restart: always
    command: ["--config=/etc/otel-col-config.yaml"]
    volumes:
      - ./infra/otel/otel-col-config.yaml:/etc/otel-col-config.yaml
    ports:
      - "4318:4318"
      - "8889:8889"
      - "8888:8888"
    networks:
      - db-network
    depends_on:
      - jaeger
      - loki

networks:
  db-network:
    driver: bridge

volumes:
  jenkins_home:
  gradle_cache:
  postgres_data:
  redis_data:
  kafka_data:
  pgadmin_data:
  grafana_data: