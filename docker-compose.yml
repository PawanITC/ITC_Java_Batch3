version: '3.9'

services:
  postgres:
    container_name: postgres-db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - db-network

  pgAdmin:
    container_name: pgadmin-ui
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - db-network

  user-service:
    container_name: user-service
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    env_file:
      - ./backend/user-service/.env
    ports:
      - "8081:8080"
    depends_on:
      - postgres
    networks:
      - db-network
    restart: on-failure:3

  api-gateway:
    container_name: api-gateway
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    env_file:
      - ./backend/api-gateway/.env
    ports:
      - "8080:8080"
    depends_on:
      - user-service
    networks:
      - db-network
    restart: on-failure:3

volumes:
  postgres_data:

networks:
  db-network:
    driver: bridge