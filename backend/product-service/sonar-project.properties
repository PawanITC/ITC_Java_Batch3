# SonarQube project configuration
sonar.projectKey=funkart-product-service
sonar.projectName=Funkart Product Service
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java

# Binary paths
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test

# Coverage
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml

# Language and encoding
sonar.language=java
sonar.sourceEncoding=UTF-8

# Exclusions (optional)
sonar.exclusions=**/*Generated.java,**/generated/**

# Host URL (will be set via command line)
# sonar.host.url=http://localhost:9000
