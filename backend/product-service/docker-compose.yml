version: '3.8'

services:
  # --- INFRASTRUCTURE (The "Always On" group) ---
  postgres:
    image: postgres:16
    container_name: product-postgres
    restart: always
    environment:
      POSTGRES_DB: product_service_db
      POSTGRES_USER: product_user
      POSTGRES_PASSWORD: product_password
    ports:
      - "5432:5432"
    volumes:
      - product_postgres_data:/var/lib/postgresql/data # PERSISTENT DATA
    networks:
      - product-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: product-pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@product.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - product_pgadmin_data:/var/lib/pgadmin # PERSISTENT SETTINGS
    networks:
      - product-network

  redis:
    image: redis:7-alpine
    container_name: product-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # PERSISTENT CACHE
    networks:
      - product-network
  redis-insight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    ports:
    - "5540:5540"
    networks:
      - product-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-kraft
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093,OUTSIDE://0.0.0.0:29092
      # CRITICAL: Added OUTSIDE for external tools and internal for app
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,OUTSIDE://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,OUTSIDE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Log Dir must match the volume path
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
    volumes:
      - kafka_data:/var/lib/kafka/data # PERSISTENT MESSAGES
    networks:
      - product-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-kraft-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - product-network
  # --- AUTOMATION ENGINE ---
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: product-jenkins
    privileged: true
    user: root
    ports:
      - "8081:8080"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - product-network
  # --- THE APPLICATION (The "Built by Jenkins" group) --
  product-service:
    image: ${DOCKER_HUB_USER}/product-service:latest
    container_name: product-service
    ports:
      - "9090:9090"
    depends_on:
      - postgres
      - kafka
      - redis
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_HOST=postgres
      - KAFKA_HOST=kafka
      - REDIS_HOST=redis
    networks:
      - product-network

volumes:
  product_postgres_data:
  product_pgadmin_data:
  redis_data:
  jenkins_data:
  kafka_data:

networks:
  product-network:
    driver: bridge