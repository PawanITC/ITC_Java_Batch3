# Section 1: Default/Global variables (Optional)
# These act as fallbacks if not provided by the OS environment
DB_HOST: localhost
DB_NAME: testdb

---
# Section 2: Test Profile Configuration
spring:
  config:
    activate:
      on-profile: test

  # --- DATABASE ---
  datasource:
    # Ensure this is indented exactly 2 spaces under 'spring:'
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  # --- SECURITY ---
  security:
    autoconfigure:
      exclude:
        - org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

  # --- KAFKA ---
  kafka:
    bootstrap-servers: ${DB_HOST}:9092
    listener:
      auto-startup: false

# Note: jwt should be at the root level if you aren't nesting it under 'spring'
jwt:
  secret: ${JWT_SECRET:Ym9yZGVyLXJlbmRlci1zZWNyZXQta2V5LTMyLWNoYXJhY3RlcnMtbG9uZw==}
  expiration-ms: 3600000