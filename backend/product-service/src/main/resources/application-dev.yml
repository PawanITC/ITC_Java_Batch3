# ==============================================================
# DEVELOPMENT PROFILE
# ==============================================================
spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-db:5432/mydb}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

# Disable tracing when running locally (no OTEL collector available).
# OTEL_EXPORTER_OTLP_ENDPOINT defaults to localhost:4317 when env var is absent,
# which causes noisy ConnectException logs. In Docker the .env file sets the correct
# collector URL so this override is not needed there.
management:
  tracing:
    enabled: false