spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/product_service_db
    username: product_user
    password: product_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
#  redis config
  data:
    redis:
        host: localhost
        port: 6379
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 10 minutes in milliseconds

  #  mongodb:
#    uri: mongodb://mongo_admin:mongo_password@localhost:27017/product_service_mongo?authSource=admin

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: product-group-v2
      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:
        spring.json.trusted.packages: com.itc.funkart.product_service.dto.events

server:
  port: 9090

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4317/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,tracing
  observations:
    http:
      server:
        requests:
          enabled: true

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
  level:
    org.springframework.kafka: DEBUG
    org.apache.kafka: WARN