spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/product_service_db
    username: product_user
    password: product_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mongodb:
    uri: mongodb://mongo_admin:mongo_password@localhost:27017/product_service_mongo?authSource=admin

server:
  port: 9090
  #Open telemetry configuration for Jaeger
management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://localhost:4317/v1/traces
  endpoints:
    web:
      exposure:
        include: health,info,metrics,tracing
  observations:
    http:
      server:
        requests:
          enabled: true
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"