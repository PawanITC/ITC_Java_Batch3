spring:
  application:
    name: product-service

  datasource:
    url: jdbc:postgresql://localhost:5432/product_service_db
    username: product_user
    password: product_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  mongodb:
    uri: mongodb://mongo_admin:mongo_password@localhost:27017/product_service_mongo?authSource=admin

server:
  port: 9090