# k8s/local/apps/jmeter-worker.yml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmeter-worker
  namespace: catalogue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jmeter-worker
  template:
    metadata:
      labels:
        app: jmeter-worker
    spec:
      containers:
        - name: jmeter
          image: justb4/jmeter:latest
          command: ["/bin/sh"]
          args:
            - -c
            - |
              export JVM_ARGS="-Xms512m -Xmx1024m -Dserver.rmi.ssl.disable=true"
              export SERVER_PORT=1099
              export SERVER_RMI_LOCALPORT=50000
              jmeter-server
          ports:
            - containerPort: 1099
            - containerPort: 50000
---
apiVersion: v1
kind: Service
metadata:
  name: jmeter-worker
  namespace: catalogue-service
spec:
  selector:
    app: jmeter-worker
  ports:
    - name: rmi
      port: 1099
      targetPort: 1099
    - name: data
      port: 50000
      targetPort: 50000