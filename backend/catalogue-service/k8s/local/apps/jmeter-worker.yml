apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmeter-worker
  namespace: catalogue-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jmeter-worker
  template:
    metadata:
      labels:
        app: jmeter-worker
    spec:
      containers:
        - name: jmeter
          image: justb4/jmeter:latest
          command: ["/bin/sh"]
          args:
            - -c
            - |
              export JVM_ARGS="-Xms512m -Xmx1024m"
              jmeter-server \
                -Dserver.rmi.localport=50000 \
                -Dserver_port=1099
          ports:
            - containerPort: 1099
            - containerPort: 50000
---
apiVersion: v1
kind: Service
metadata:
  name: jmeter-worker
  namespace: catalogue-service
spec:
  selector:
    app: jmeter-worker
  ports:
    - port: 1099
    - port: 50000