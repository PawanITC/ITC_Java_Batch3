apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmeter
  namespace: catalogue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jmeter
  template:
    metadata:
      labels:
        app: jmeter
    spec:
      containers:
        - name: jmeter
          image: justb4/jmeter:latest
          command: ["/bin/sh"]
          args: ["-c", "sleep infinity"]

          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"

          env:
            - name: JVM_ARGS
              value: "-Xms512m -Xmx1g -Dserver.rmi.ssl.disable=true"