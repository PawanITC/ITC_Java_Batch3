apiVersion: apps/v1
kind: Deployment
metadata:
  name: jmeter
  namespace: catalogue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jmeter
  template:
    metadata:
      labels:
        app: jmeter
    spec:
      containers:
        - name: jmeter
          image: justb4/jmeter:latest
          command: ["/bin/sh"]
          args: ["-c", "sleep infinity"]

          resources:
            requests:
              memory: "1500Mi"
              cpu: "500m"
            limits:
              memory: "1500Mi"
              cpu: "1"

          env:
            - name: JVM_ARGS
              value: "-Xms1g -Xmx1200m"