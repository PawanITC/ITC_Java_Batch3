apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalogue-service
  template:
    metadata:
      labels:
        app: catalogue-service
    spec:
      containers:
        - name: catalogue-service
          image: localhost:5000/catalogue-service-registry:local
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_REDIS_HOST
              value: "redis"

---
apiVersion: v1
kind: Service
metadata:
  name: catalogue-service
spec:
  type: LoadBalancer
  selector:
    app: catalogue-service
  ports:
    - port: 8081
      targetPort: 8081