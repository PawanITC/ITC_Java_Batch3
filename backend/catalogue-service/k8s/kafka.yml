apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc
  namespace: catalogue-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: catalogue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:4.1.2
          ports:
            - containerPort: 9092
            - containerPort: 9093

          env:
            - name: KAFKA_NODE_ID
              value: "1"

            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"

            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"

            # ✅ FIXED HERE
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.catalogue-service.svc.cluster.local:9092"

            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"

            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:9093"

            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"

            - name: CLUSTER_ID
              value: "5L6g3nShT-eMCtK--X86sw"

          volumeMounts:
            - name: kafka-storage
              mountPath: /var/lib/kafka/data

      volumes:
        - name: kafka-storage
          persistentVolumeClaim:
            claimName: kafka-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: catalogue-service
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092