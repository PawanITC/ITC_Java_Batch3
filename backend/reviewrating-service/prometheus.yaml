global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'review-rating-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['review-rating-service:8080']

  - job_name: 'review-aggregator-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['review-aggregator-service:8081']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']