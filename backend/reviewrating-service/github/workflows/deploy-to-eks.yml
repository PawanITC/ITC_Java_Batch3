name: Build & Deploy to EKS

on:
  push:
    branches: [ main ]

env:
  AWS_REGION: eu-west-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
  CLUSTER_NAME: review-rating-cluster

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build review-rating-service
        working-directory: ./review-rating-service
        run: ./gradlew clean build -x test

      - name: Build rating-aggregator-service
        working-directory: ./rating-aggregator-service
        run: ./gradlew clean build -x test

      - name: Build & push Docker images
        run: |
          SERVICES=("review-rating-service" "rating-aggregator-service")
          for SVC in "${SERVICES[@]}"; do
            IMAGE="$ECR_REGISTRY/$SVC:latest"
            docker build -t "$IMAGE" "./$SVC"
            docker push "$IMAGE"
          done

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/base/
          kubectl apply -f k8s/review-rating-service/
          kubectl apply -f k8s/rating-aggregator-service/
          kubectl apply -f k8s/ingress/