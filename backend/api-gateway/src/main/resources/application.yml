internal:
  service-urls:
    user: ${USER_SERVICE_URL:http://user-service:8080}
    payment: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
    product: ${PRODUCT_SERVICE_URL:http://product-service:8080}
    order: ${ORDER_SERVICE_URL:http://order-service:8080}

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000ms

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  webflux:
    base-path: /

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - ${FRONTEND_URL:http://localhost:5173}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - Authorization
                  - Set-Cookie
                allowCredentials: true
                maxAge: 3600

          routes:
            - id: user-service
              uri: ${internal.service-urls.user}
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=2

            - id: product-service
              uri: ${internal.service-urls.product}
              predicates:
                - Path=/api/v1/products/**,/api/v1/admin/products/**,/api/v1/categories/**,/api/v1/admin/categories/**,/api/v1/cart/**
              filters:
                - StripPrefix=2

            - id: order-service
              uri: ${internal.service-urls.order}
              predicates:
                - Path=/api/v1/orders/**,/api/v1/admin/orders/**
              filters:
                - StripPrefix=2

            - id: payment-service
              uri: ${internal.service-urls.payment}
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - StripPrefix=2

# IMPORTANT: app config MUST be at root level (NOT inside spring)
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  oauth-success-path: /oauth-success

  services:
    user-service: ${USER_SERVICE_URL:http://user-service:8080}
    payment-service: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
    order-service: ${ORDER_SERVICE_URL:http://order-service:8080}
    product-service: ${PRODUCT_SERVICE_URL:http://product-service:8080}

  jwt:
    secret: ${JWT_SECRET:dev-secret-key-dev-secret-key-123456}
    expiration-ms: 3600000
    cookie-max-age-seconds: 3600
    cookie-name: token
    secure-cookie: false

  github:
    client-id: ${GITHUB_CLIENT_ID:test}
    client-secret: ${GITHUB_CLIENT_SECRET:test}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8060/api/v1/oauth/github/callback}