spring:
  application:
    name: api-gateway
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  cloud:
    gateway:
      routes:
        # Route for general User Service data (e.g., profiles, addresses)
        # We let the Gateway Controller handle /login and /signup specifically.
        - id: user-service-data
          uri: ${USER_SERVICE_URL:http://user-service:8080}
          predicates:
            - Path=/api/v1/users/profile/**, /api/v1/users/settings/**
          # No StripPrefix needed if User-Service uses @RequestMapping("/api/v1/users")

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=2 # Strips /api and /v1 so service gets /payments/**

server:
  port: 8080

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  api:
    version: /api/v1

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    cookie-max-age-seconds: ${JWT_COOKIE_MAX_AGE_SECONDS:3600}
    cookie-name: ${APP_COOKIE_NAME:token}
    secure-cookie: ${APP_SECURE_COOKIE:false}

  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics  # minimal for prod
  endpoint:
    health:
      show-details: always