# ==============================================================================
# MASTER SERVICE REGISTRY (The "Master Key")
# ==============================================================================
internal:
  service-urls:
    user: ${USER_SERVICE_URL:http://user-service:8080}
    payment: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
    product: ${PRODUCT_SERVICE_URL:http://product-service:8080}
    order: ${ORDER_SERVICE_URL:http://order-service:8080}
    review: ${REVIEW_SERVICE_URL:http://review-rating-service:9097}

spring:
  application:
    name: api-gateway

  main:
    web-application-type: reactive
    allow-bean-definition-overriding: true

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000ms

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  webflux:
    base-path: /

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              "[/**]":
                allowedOrigins:
                  - ${FRONTEND_URL:http://localhost:5173}
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - PATCH
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders:
                  - Authorization
                  - Set-Cookie
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: admin-user-service
              uri: ${internal.service-urls.user}
              predicates:
                # Include the base path WITHOUT trailing slash so /api/v1/admin/users is also matched
                - Path=/api/v1/admin/users,/api/v1/admin/users/**
              filters:
                - StripPrefix=2

            - id: user-service
              uri: ${internal.service-urls.user}
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=2

            - id: product-service
              uri: ${internal.service-urls.product}
              predicates:
                - Path=/api/v1/products/**,/api/v1/admin/products/**,/api/v1/categories/**,/api/v1/admin/categories/**,/api/v1/cart/**
              filters:
                - StripPrefix=2

            - id: order-service
              uri: ${internal.service-urls.order}
              predicates:
                # Include base paths WITHOUT trailing slash to avoid gateway 404
                - Path=/api/v1/orders,/api/v1/orders/**,/api/v1/admin/orders,/api/v1/admin/orders/**
              filters:
                - StripPrefix=2

            - id: payment-service
              uri: ${internal.service-urls.payment}
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - StripPrefix=2

            - id: review-service
              uri: ${internal.service-urls.review}
              predicates:
                - Path=/api/v1/reviews/**
              filters:
                - StripPrefix=2

# ==============================================================================
# APP CONFIG
# ==============================================================================
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  oauth-success-path: ${OAUTH_SUCCESS_PATH:/oauth-success}

  services:
    user-service: ${internal.service-urls.user}
    payment-service: ${internal.service-urls.payment}
    product-service: ${internal.service-urls.product}
    order-service: ${internal.service-urls.order}

  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8060/api/v1/oauth/github/callback}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    cookie-name: ${APP_COOKIE_NAME:token}
    cookie-max-age-seconds: ${JWT_COOKIE_MAX_AGE_SECONDS:3600}
    secure-cookie: ${APP_SECURE_COOKIE:false}

server:
  port: ${PORT:8060}

# ==============================================================================
# OBSERVABILITY
# ==============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  health:
    show-details: always
    redis:
      enabled: true

  observations:
    key-values:
      application: ${spring.application.name}

  tracing:
    sampling:
      probability: 1.0

  otlp:
    tracing:
      # Spring Boot Micrometer sends HTTP traces — must use port 4318, NOT 4317 (gRPC).
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_URL:http://otel-collector:4318/v1/metrics}

  metrics:
    tags:
      application: ${spring.application.name}

  loki:
    endpoint: ${LOKI_URL:http://loki:3100/loki/api/v1/push}

# ==============================================================================
# LOGGING
# ==============================================================================
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %m%n"
  level:
    root: INFO
    com.itc.funkart.gateway: DEBUG
    io.micrometer.tracing: DEBUG