spring:
  application:
    name: api-gateway
  cloud:
    gateway:
          routes:
            - id: user-service
              uri: http://localhost:8081      # user-service runs locally
              predicates:
                - Path=/api/v1/users/**       # all user endpoints

server:
  port: 8080  # Gateway listens here

# API version prefix
api:
  version: /api/v1

# JWT settings for validation (must match user-service)
jwt:
  secret: ${JWT_SECRET}                  # used to validate JWT tokens
  cookie-max-age-seconds: ${JWT_COOKIE_MAX_AGE_SECONDS}

# Frontend URL for redirects / CORS
frontend:
  url: ${FRONTEND_URL}

# Cookie security settings
app:
  secure-cookie: ${APP_SECURE_COOKIE}    # false for local dev, true in prod

# Spring Cloud Gateway routes