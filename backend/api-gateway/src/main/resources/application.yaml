# ==============================================================================
# API GATEWAY CONFIGURATION
# ==============================================================================

spring:
  application:
    name: api-gateway

  # ----------------------------------------------------------------------------
  # REDIS (rate limit / caching)
  # ----------------------------------------------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      connect-timeout: 2000ms

  # ----------------------------------------------------------------------------
  # DISABLE DB AUTO-CONFIG (gateway is reactive only)
  # ----------------------------------------------------------------------------
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  # ----------------------------------------------------------------------------
  # GATEWAY ROUTES
  # ----------------------------------------------------------------------------
  cloud:
    gateway:
      server:
        webflux:
          routes:

            # ======================================================
            # USER SERVICE
            # ======================================================
            - id: user-service
              uri: ${USER_SERVICE_URL:http://user-service:8080}
              predicates:
                - Path=/api/v1/users/**,/api/v1/oauth/**
              filters:
                - StripPrefix=2

            - id: user-admin-service
              uri: ${USER_SERVICE_URL:http://user-service:8080}
              predicates:
                - Path=/api/v1/admin/users/**
              filters:
                - StripPrefix=2


            # ======================================================
            # PRODUCT SERVICE
            # ======================================================
            - id: product-admin-service
              uri: ${PRODUCT_SERVICE_URL:http://product-service:8080}
              predicates:
                - Path=/api/v1/admin/products/**,/api/v1/admin/categories/**
              filters:
                - StripPrefix=2

            - id: product-cart-service
              uri: ${PRODUCT_SERVICE_URL:http://product-service:8080}
              predicates:
                - Path=/api/v1/cart/**
              filters:
                - StripPrefix=2

            - id: product-categories-service
              uri: ${PRODUCT_SERVICE_URL:http://product-service:8080}
              predicates:
                - Path=/api/v1/categories/**
              filters:
                - StripPrefix=2

            - id: product-service
              uri: ${PRODUCT_SERVICE_URL:http://product-service:8080}
              predicates:
                - Path=/api/v1/products/**
              filters:
                - StripPrefix=2


            # ======================================================
            # ORDER SERVICE
            # ======================================================
            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://order-service:8080}
              predicates:
                - Path=/api/v1/orders/**
              filters:
                - StripPrefix=2

            - id: order-admin-service
              uri: ${ORDER_SERVICE_URL:http://order-service:8080}
              predicates:
                - Path=/api/v1/admin/orders/**
              filters:
                - StripPrefix=2


            # ======================================================
            # PAYMENT SERVICE
            # ======================================================
            - id: payment-webhook-route
              uri: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
              predicates:
                - Path=/api/v1/payments/webhook/**
              filters:
                - StripPrefix=2

            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
              predicates:
                - Path=/api/v1/payments/**
              filters:
                - StripPrefix=2


# ==============================================================================
# SERVER
# ==============================================================================
server:
  port: ${PORT:8060}


# ==============================================================================
# ACTUATOR
# ==============================================================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always


# ==============================================================================
# APP CONFIG
# ==============================================================================
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  oauth-success-path: ${OAUTH_SUCCESS_PATH:/oauth-success}

  services:
    user-service: ${USER_SERVICE_URL:http://user-service:8080}
    payment-service: ${PAYMENT_SERVICE_URL:http://payment-service:8080}
    product-service: ${PRODUCT_SERVICE_URL:http://product-service:8080}
    order-service: ${ORDER_SERVICE_URL:http://order-service:8080}

  github:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8060/api/v1/oauth/github/callback}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    cookie-name: ${APP_COOKIE_NAME:token}
    cookie-max-age-seconds: ${JWT_COOKIE_MAX_AGE_SECONDS:3600}
    secure-cookie: ${APP_SECURE_COOKIE:false}