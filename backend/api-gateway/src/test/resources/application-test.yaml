spring:
  application:
    name: api-gateway-test

  # Crucial for allowing @MockitoBean to replace production beans
  main:
    allow-bean-definition-overriding: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  webflux:
    base-path: /api/v1

  cloud:
    gateway:
      routes:
        - id: user-service-data-test
          uri: http://localhost:${wiremock.server.port}
          predicates:
            - Path=/api/v1/users/profile/**
          filters:
            - StripPrefix=0

server:
  port: 0

app:
  frontend-url: "http://localhost:5173"
  api:
    version: /api/v1

  services:
    # Ensure this key exactly matches the @Value in your Java code
    user-service: "http://localhost:${wiremock.server.port}"

  jwt:
    # Using a 256-bit safe secret for tests
    secret: "mXxbssTvw7+m8gAlzYhTCP4IyxMeOK2tDqSDPQAv6Qk="
    expiration-ms: 3600000
    cookie-max-age-seconds: 3600
    cookie-name: "token"
    secure-cookie: false

  github:
    client-id: "test-id"
    client-secret: "test-secret"
    redirect-uri: "http://localhost:8080/oauth/github/callback"