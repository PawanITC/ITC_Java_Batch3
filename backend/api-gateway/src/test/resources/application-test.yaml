spring:
  application:
    name: api-gateway-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: user-service-data-test
          # Pointing to WireMock's dynamic port
          uri: http://localhost:${wiremock.server.port}
          predicates:
            - Path=/api/v1/users/profile/** # Only route data-specific paths
          filters:
            - StripPrefix=0 # Keep the full path so it matches your WireMock stubs

server:
  port: 0

app:
  frontend-url: "http://localhost:5173"
  api:
    version: "/api/v1"

  services:
    # This is what your WebClient in UserController uses!
    user-service-url: "http://localhost:${wiremock.server.port}"

  jwt:
    secret: "mXxbssTvw7+m8gAlzYhTCP4IyxMeOK2tDqSDPQAv6Qk="
    expiration-ms: 3600000
    cookie-max-age-seconds: 3600
    cookie-name: "token"
    secure-cookie: false

  github:
    client-id: "test-id"
    client-secret: "test-secret"
    redirect-uri: "http://localhost:8080/oauth/github/callback"