spring:
  application:
    name: api-gateway-test
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
  cloud:
    gateway:
      routes:
        - id: user-service
          # In tests, we route to WireMock.
          # If using @AutoConfigureWireMock(port = 0), this is usually handled dynamically,
          # but setting a base helps prevent routing errors.
          uri: http://localhost:${wiremock.server.port:8081}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=1

server:
  port: 0 # Random port for tests

# --- Matches the @ConfigurationProperties(prefix = "app") ---
app:
  frontend-url: "http://localhost:5173"

  api:
    version: "/api/v1"

  services:
    # This must match the port WireMock is running on so your WebClient hits the stub
    user-service-url: "http://localhost:${wiremock.server.port:8081}"

  jwt:
    secret: "mXxbssTvw7+m8gAlzYhTCP4IyxMeOK2tDqSDPQAv6Qk="
    expiration-ms: 3600000
    cookie-max-age-seconds: 3600
    cookie-name: "token"
    secure-cookie: false

  github:
    client-id: "test-id"
    client-secret: "test-secret"
    redirect-uri: "http://localhost:8080/callback"