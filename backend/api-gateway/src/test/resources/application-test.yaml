spring:
  application:
    name: api-gateway-test

  main:
    allow-bean-definition-overriding: true

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration
      - org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:${wiremock.server.port}
          predicates:
            - Path=/api/v1/users/**

        - id: payment-service
          uri: http://localhost:${wiremock.server.port}
          predicates:
            - Path=/api/v1/payments/**

server:
  port: 0

app:
  frontend-url: http://localhost:5173

  services:
    user-service: http://localhost:${wiremock.server.port}

  jwt:
    secret: "dGhpcy1pcy1hLXZlcnktbG9uZy1zZWNyZXQta2V5LWZvci10ZXN0aW5nLWJhc2U2NA=="
    expiration-ms: 3600000
    cookie-max-age-seconds: 3600
    cookie-name: token
    secure-cookie: false

  github:
    client-id: test-id
    client-secret: test-secret
    redirect-uri: http://localhost:8080/oauth/github/callback