spring:
  datasource:
    url: ${DB_URL}
    driver-class-name: ${DB_DRIVER}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:create-drop}
    show-sql: ${SHOW_SQL:true}

logging:
  level:
    org.springframework.core.env: DEBUG

github:
  oauth:
    client-id: ${CLIENT_ID}
    client-secret: ${CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${EXPIRATION_MS}

app:
  secure-cookie: ${APP_SECURE_COOKIE}

