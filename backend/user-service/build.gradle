plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.5'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
}

group = 'com.itc.funkart'
version = '0.0.1-SNAPSHOT'
description = 'user-service'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // --- Core Framework & Web ---
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-webflux' // Non-blocking support (WebClient)
    implementation 'org.springframework.boot:spring-boot-starter-validation' // Jakarta/Hibernate Validation
    implementation 'org.springframework.boot:spring-boot-starter-actuator' // Monitoring & Management

    // --- Persistence & Database ---
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.postgresql:postgresql:42.7.7' // Production DB driver
    runtimeOnly 'com.h2database:h2' // Runtime support for H2

    // --- Security & Identity ---
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // --- Messaging ---
    implementation 'org.springframework.kafka:spring-kafka'

    // --- Logic Generation (Lombok) ---
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    testCompileOnly 'org.projectlombok:lombok:1.18.30' // Needed to use Lombok in tests
    testAnnotationProcessor 'org.projectlombok:lombok:1.18.30'

    // --- Testing ---
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test' // Security mocking (@WithMockUser)
    testImplementation 'org.springframework.kafka:spring-kafka-test' // Embedded Kafka for testing
    testImplementation 'com.h2database:h2' // In-memory DB for integration tests
    testImplementation 'com.squareup.okhttp3:mockwebserver:4.12.0' // Mocking external API responses
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

// Configures JaCoCo to generate the XML data Jenkins needs
jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        csv.required = false
        html.required = true
    }
}

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy jacocoTestReport // Automatically runs coverage report after tests finish
}

// Disable standard JAR task to prioritize BootJar
tasks.named('jar') {
    enabled = false
}

// Configures the final executable artifact
tasks.named('bootJar') {
    archiveFileName = "user-service-0.0.1-SNAPSHOT.jar"
}