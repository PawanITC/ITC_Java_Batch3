plugins {
    id 'java'
    id 'org.springframework.boot' version '3.3.5'
    id 'io.spring.dependency-management' version '1.1.7'
}

group = 'com.itc.funkart'
version = '0.0.1-SNAPSHOT'
description = 'user-service'

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(17)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    // Spring Data & Web (MVC - blocking stack)
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Database - PostgresSQL
    implementation 'org.postgresql:postgresql:42.7.7'

    // Security - Spring Security
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // Validation - Bean Validation (Jakarta Validation / Hibernate Validator)
    implementation 'org.springframework.boot:spring-boot-starter-validation'

    // Reactive Web - Spring WebFlux (non-blocking stack)
    implementation 'org.springframework.boot:spring-boot-starter-webflux'

    // Authentication - JWT (JSON Web Token)
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // Bean Monitoring & Management - Spring Actuator
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // Testing - H2 in-memory DB & Spring Test
    testImplementation('com.h2database:h2')
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    runtimeOnly 'com.h2database:h2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Code Generation - Lombok
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'

    // Messaging - Apache Kafka
    implementation 'org.springframework.kafka:spring-kafka'
}

tasks.named('test') {
    useJUnitPlatform()
}

tasks.named('jar') {
    enabled = false
}

tasks.named('bootJar') {
    archiveFileName = "payment-service-0.0.1-SNAPSHOT.jar"
}