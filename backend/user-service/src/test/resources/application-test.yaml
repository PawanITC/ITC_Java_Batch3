spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: user-service-test

  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    # Let Spring Boot auto-detect the dialect, or use the updated v3 dialect
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false # This prevents the consumer, but NOT the producer beans

# Use flat keys if your @Value continues to struggle,
# but this nested version is standard for @ConfigurationProperties
api:
  version: "api/v1"

jwt:
  secret: dGhpcy1pcy1hLXZlcnktbG9uZy1hbmQtc2VjdXJlLXRlc3Qtc2VjcmV0LWtleS1mb3Itand0
  expiration-ms: 3600000
  cookie-max-age-seconds: 3600

github:
  oauth:
    client-id: "test-id"
    client-secret: "test-secret"
    redirect-uri: "http://localhost:8080/callback"

frontend:
