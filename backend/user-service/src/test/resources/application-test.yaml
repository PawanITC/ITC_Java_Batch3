spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: user-service-test

  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  kafka:
    bootstrap-servers: localhost:9092
    listener:
      auto-startup: false # Disables Consumers
    producer:
      properties:
        # Fails fast if no broker is found, stopping the log loop
        max.block.ms: 500
        delivery.timeout.ms: 1000
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 1000

