spring:
  application:
    name: user-service
  web:
    resources:
      add-mappings: false

api:
  version: v1

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${EXPIRATION_MS}
  cookie-max-age-seconds: ${JWT_COOKIE_MAX_AGE_SECONDS}

frontend:
  url: ${FRONTEND_URL}

app:
  secure-cookie: ${APP_SECURE_COOKIE}

logging:
  level:
    org.springframework.core.env: INFO

github:
  oauth:
    client-id: ${GITHUB_CLIENT_ID}
    client-secret: ${GITHUB_CLIENT_SECRET}
    redirect-uri: ${GITHUB_REDIRECT_URI}