spring:
  config:
    activate:
      on-profile: test

  # --- Database (H2 In-Memory) ---
  datasource:
    # 'DB_CLOSE_DELAY=-1' keeps the data alive as long as the JVM is running
    url: jdbc:h2:mem:order_service_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  h2:
    console:
      enabled: true # Allows you to see the DB at localhost:8081/h2-console during debug

  jpa:
    hibernate:
      # 'create-drop' ensures a clean schema for every test execution
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  # --- Kafka (Mock/Embedded) ---
  kafka:
    consumer:
      auto-startup: false
    listener:
      auto-startup: false

  # --- Redis (Disabled/Mocked for tests) ---
  data:
    redis:
      repositories:
        enabled: false

# --- Security Overrides for Testing ---
jwt:
  secret: dGVzdC1zZWNyZXQtZm9yLXVuaXQtdGVzdGluZy1wdXJwb3Nlcy1vbmx5MjU2Yml0cw== # Base64 test string
  expiration-ms: 3600000

# --- Management/Metrics ---
management:
  tracing:
    enabled: false # Disable tracing during tests to speed things up