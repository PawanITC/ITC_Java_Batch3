version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: postgres-db
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - db-network


  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-ui
    restart: always

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - db-network


volumes:
  postgres_data:


networks:
  db-network:
    driver: bridge