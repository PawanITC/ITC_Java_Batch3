spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL # Added PostgreSQL mode for compatibility
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    # Let Hibernate 6 auto-detect the dialect (don't force PostgreSQLDialect here)
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092} # Fallback for tests
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

