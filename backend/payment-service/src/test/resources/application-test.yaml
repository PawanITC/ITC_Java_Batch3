spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL # Added PostgreSQL mode for compatibility
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    # Let Hibernate 6 auto-detect the dialect (don't force PostgreSQLDialect here)
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: payment-test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.itc.funkart.payment.dto.event"
        # ADD THESE TO YOUR TEST YAML TOO:
        spring.json.value.default.type: "com.itc.funkart.payment.dto.event.OrderCreatedEvent"
        spring.json.use.type.headers: false

