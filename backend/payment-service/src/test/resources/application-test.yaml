spring:
  application:
    name: payment-service-test

  datasource:
    # H2 in-memory leverages the JVM's Heap memory for high-speed test execution
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  kafka:
    # This placeholder is dynamically filled by the @EmbeddedKafka broker
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Do NOT add __TypeId__ headers in tests — the consumer reads Map<String,Object>
        # and enabling type headers causes the deserializer to produce a typed OrderEvent
        # instance that cannot be assigned to Map<String,Object>.
        spring.json.add.type.headers: false
    consumer:
      # Random UUID prevents group ID clashes in the JVM's process memory
      group-id: test-group-${random.uuid}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # Must be false: lets JsonDeserializer produce LinkedHashMap from JSON objects,
        # which is what Map<String,Object> in the consumer method receives.
        # When true, the deserializer reads __TypeId__ headers and produces a typed
        # object (e.g. OrderEvent) — incompatible with the Map<String,Object> param.
        spring.json.use.type.headers: false

jwt:
  # Dummy secret to satisfy JwtService bean initialization in the JVM
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration-ms: 1h

