plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.14'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
}

group = 'com.itc.funkart'
version = '0.0.1-SNAPSHOT'
description = 'payment-service'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

repositories {
    mavenCentral()
}

dependencyManagement {
    dependencies {
        // Jackson Suite
        dependency 'com.fasterxml.jackson.core:jackson-databind:2.21.2'
        dependency 'com.fasterxml.jackson.core:jackson-core:2.21.2'
        // FIX: jackson-annotations uses 2.21 (no patch version)
        dependency 'com.fasterxml.jackson.core:jackson-annotations:2.21'
        dependency 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.21.2'
        dependency 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.21.2'

        // Tomcat Suite
        dependency 'org.apache.tomcat.embed:tomcat-embed-core:10.1.54'
        dependency 'org.apache.tomcat.embed:tomcat-embed-websocket:10.1.54'
        dependency 'org.apache.tomcat.embed:tomcat-embed-el:10.1.54'
    }
}

configurations {
    configureEach {
        exclude group: "com.fasterxml.jackson.module", module: "jackson-module-scala_2.13"
        exclude group: "com.fasterxml.jackson.module", module: "jackson-module-scala_2.12"
    }
}

dependencies {

    // =====================
    // Shared Contracts
    // =====================
    // This connects the Service to your common library
    implementation project(':common-contracts')

    // === 1. BOILERPLATE & UTILS ===
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.apache.commons:commons-lang3:3.18.0'
    implementation 'org.springframework.boot:spring-boot-starter-aop'

    // === 2. CORE SPRING BOOT ===
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // === 3. DATABASE & PERSISTENCE ===
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.postgresql:postgresql:42.7.7'

    // === 4. MESSAGING & INTEGRATIONS ===
    implementation 'org.springframework.kafka:spring-kafka:3.3.2'
    implementation 'com.stripe:stripe-java:28.4.0'

    // Resilience4j - Version aligned with Spring Boot 3.x standards
    implementation 'io.github.resilience4j:resilience4j-spring-boot3:2.2.0'
    implementation 'io.github.resilience4j:resilience4j-circuitbreaker:2.2.0'
    implementation 'io.github.resilience4j:resilience4j-ratelimiter:2.2.0'


    // === 5. SECURITY & JWT (JJWT) ===
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // === 7. OBSERVABILITY (OTEL / Micrometer) ===
    implementation 'io.micrometer:micrometer-tracing-bridge-otel'
    implementation 'io.opentelemetry:opentelemetry-exporter-otlp'
    runtimeOnly 'io.micrometer:micrometer-registry-prometheus'

    // === 6. TESTING ===
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    testImplementation 'io.rest-assured:rest-assured:5.5.7'
    testImplementation 'com.h2database:h2'
    testImplementation 'org.awaitility:awaitility:4.3.0'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
    // Filter coverage to focus on logic rather than boilerplate
    afterEvaluate {
        classDirectories.setFrom(files(classDirectories.files.collect {
            fileTree(dir: it, exclude: [
                    "**/dto/**",
                    "**/entity/**",
                    "**/config/**",
                    "**/*Application*"
            ])
        }))
    }
}

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs("-XX:+EnableDynamicAgentLoading")
    finalizedBy jacocoTestReport
}

tasks.named('jar') {
    enabled = false
}

tasks.named('bootJar') {
    archiveFileName = "payment-service.jar"
}