plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.12'
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
}

group = 'com.itc.funkart'
version = '0.0.1-SNAPSHOT'
description = 'payment-service'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

repositories {
    mavenCentral()
}

// Global version enforcement (Replaces the "Hammer" loop)
dependencyManagement {
    dependencies {
        // Jackson Suite - Standardized to 2.18.2
        dependency 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
        dependency 'com.fasterxml.jackson.core:jackson-core:2.18.2'
        dependency 'com.fasterxml.jackson.core:jackson-annotations:2.18.2'
        dependency 'com.fasterxml.jackson.datatype:jackson-datatype-jdk8:2.18.2'
        dependency 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.2'

        // Tomcat Suite - Security Fixes
        dependency 'org.apache.tomcat.embed:tomcat-embed-core:10.1.53'
        dependency 'org.apache.tomcat.embed:tomcat-embed-websocket:10.1.53'
        dependency 'org.apache.tomcat.embed:tomcat-embed-el:10.1.53'
    }
}

configurations {
    configureEach {
        // Exclude the Scala module if it's being brought in by a transitive dependency
        exclude group: "com.fasterxml.jackson.module", module: "jackson-module-scala_2.13"
        exclude group: "com.fasterxml.jackson.module", module: "jackson-module-scala_2.12"
    }
}

dependencies {
    // === 1. BOILERPLATE & UTILS ===
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'org.apache.commons:commons-lang3:3.18.0'

    // === 2. CORE SPRING BOOT ===
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // === 3. DATABASE & PERSISTENCE ===
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.postgresql:postgresql:42.7.7'

    // === 4. MESSAGING & INTEGRATIONS ===
    implementation 'org.springframework.kafka:spring-kafka:3.3.2'
    implementation 'com.stripe:stripe-java:28.1.0'

    // === 5. SECURITY & JWT (JJWT) ===
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // === 6. TESTING ===
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    testImplementation 'io.rest-assured:rest-assured:5.5.7'
    testImplementation 'com.h2database:h2'
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.named('test') {
    useJUnitPlatform()
    // Suppresses the "Dynamic loading of agents" warning in Java 17/21
    jvmArgs("-XX:+EnableDynamicAgentLoading")
    finalizedBy jacocoTestReport
}

tasks.named('jar') {
    enabled = false
}

tasks.named('bootJar') {
    archiveFileName = "payment-service.jar"
}