plugins {
    id 'java'
    id 'org.springframework.boot' version '3.5.12' // FIX: Upgrading to 3.5.12 fixes Auth Bypass and Tomcat issues
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
}

group = 'com.itc.funkart'
version = '0.0.1-SNAPSHOT'
description = 'payment-service'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17
}

repositories {
    mavenCentral()
}

dependencies {
    // === 1. BOILERPLATE & UTILS ===
    compileOnly 'org.projectlombok:lombok:1.18.34'
    annotationProcessor 'org.projectlombok:lombok:1.18.34'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // === 2. CORE SPRING BOOT ===
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // === 3. DATABASE & PERSISTENCE ===
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.postgresql:postgresql:42.7.7'

    // === 4. MESSAGING & INTEGRATIONS ===
    implementation 'org.springframework.kafka:spring-kafka:3.3.2' // FIX: Patches Kafka Client SSRF
    implementation 'com.stripe:stripe-java:28.1.0' // FIX: Maintenance update for security

    // === 5. SECURITY & JWT ===
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // === 6. TESTING ===
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    testImplementation 'io.rest-assured:rest-assured:5.5.0'
    testImplementation 'com.h2database:h2'
    testImplementation 'org.mockito:mockito-inline:5.2.0'

    // === 7. SNYK ACQUIESCENCE (Manual Force Overrides) ===
    constraints {
        // FIX: Forces Jackson to 2.21.2 to resolve the "Allocation of Resources" (DoS) bugs
        implementation('com.fasterxml.jackson.core:jackson-databind:2.21.2')
        implementation('com.fasterxml.jackson.core:jackson-core:2.21.2')

        // FIX: Forces commons-lang3 to 3.18.0 to stop the "Uncontrolled Recursion" bug in Rest-Assured
        testImplementation('org.apache.commons:commons-lang3:3.18.0')

        // FIX: Forces lz4-java to 1.8.0+ to prevent Out-of-bounds Read in Kafka
        implementation('org.lz4:lz4-java:1.8.0')
    }
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        html.required = true
    }
}

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

tasks.named('jar') {
    enabled = false
}

tasks.named('bootJar') {
    archiveFileName = "payment-service.jar"
}