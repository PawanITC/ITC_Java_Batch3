plugins {
    id 'java'
    id 'org.springframework.boot' version '3.4.3' // Bumped to 3.4.3 to fix core Spring/Jackson vulnerabilities
    id 'io.spring.dependency-management' version '1.1.7'
    id 'jacoco'
}

group = 'com.itc.funkart'
version = '0.0.1-SNAPSHOT'
description = 'payment-service'

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

tasks.withType(JavaCompile).configureEach {
    options.release = 17 // Change this from 21 to 17
}

repositories {
    mavenCentral()
}

dependencies {
    // === 1. BOILERPLATE & UTILS ===
    compileOnly 'org.projectlombok:lombok:1.18.30'
    annotationProcessor 'org.projectlombok:lombok:1.18.30'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'

    // === 2. CORE SPRING BOOT ===
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-validation'
    implementation 'org.springframework.boot:spring-boot-starter-security'

    // === 3. DATABASE & PERSISTENCE ===
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'org.postgresql:postgresql:42.7.7'

    // === 4. MESSAGING & INTEGRATIONS ===
    implementation 'org.springframework.kafka:spring-kafka'
    implementation 'com.stripe:stripe-java:28.0.0'

    // === 5. SECURITY & JWT ===
    implementation 'io.jsonwebtoken:jjwt-api:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-impl:0.12.6'
    runtimeOnly 'io.jsonwebtoken:jjwt-jackson:0.12.6'

    // === 6. TESTING ===
    testImplementation 'org.springframework.boot:spring-boot-starter-test'
    testImplementation 'org.springframework.security:spring-security-test'
    testImplementation 'org.springframework.boot:spring-boot-starter-oauth2-resource-server'
    testImplementation 'org.springframework.kafka:spring-kafka-test'
    testImplementation 'io.rest-assured:rest-assured:5.5.0'
    testImplementation 'com.h2database:h2'
    testImplementation 'org.mockito:mockito-inline:5.2.0'

    // === 7. SNYK ACQUIESCENCE (The Fix) ===
    constraints {
        // Forces all Jackson usage to 2.18.2+ to kill the DoS vulnerabilities
        implementation('com.fasterxml.jackson.core:jackson-databind:2.18.2')
        implementation('com.fasterxml.jackson.core:jackson-core:2.18.2')

        // Fixes the Rest-Assured transitive vulnerability (CVE-2025-48924)
        testImplementation('org.apache.commons:commons-lang3:3.17.0')

        // Fixes Kafka transitive issues
        implementation('org.apache.kafka:kafka-clients:3.8.1')
    }
}

jacocoTestReport {
    dependsOn test
    reports {
        xml.required = true
        csv.required = false
        html.required = true
    }
}

// === TASK CONFIGURATION ===

tasks.named('test') {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

tasks.named('jar') {
    enabled = false // Ensures we only build the executable bootJar
}

tasks.named('bootJar') {
    archiveFileName = "payment-service-${version}.jar"
}