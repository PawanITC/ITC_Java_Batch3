spring:
  application:
    name: notification-service

  # ── Mail ──────────────────────────────────────────────────────────────────
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ── Database ───────────────────────────────────────────────────────────────
  # POSTGRES_HOST defaults to localhost for local dev; Docker sets it to postgres-db.
  # DB_NAME defaults to "mydb" — the single shared database created by docker-compose.
  # "notificationDB" was the original name but was never created in the postgres container.
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${DB_NAME:mydb}
    username: ${POSTGRES_notificationDB_user:postgres}
    password: ${POSTGRES_notificationDB_pass:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Kafka ──────────────────────────────────────────────────────────────────
  # Two separate ports: 29092 for local dev, 9092 inside Docker network
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:${KAFKA_PORT:29092}
    consumer:
      group-id: notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# ── Server ─────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}

# ── Twilio (do NOT commit real values — inject via .env / Docker secrets) ──
twilio:
  account-sid: ${TWILIO_SID}
  auth-token: ${TWILIO_AUTHTOKEN}
  from-number: ${TWILIO_FROMNUMBER}

# ── Resilience4j retry ─────────────────────────────────────────────────────
resilience4j:
  retry:
    instances:
      smsRetry:
        max-attempts: 3
        wait-duration: 2s
      emailRetry:
        max-attempts: 3
        wait-duration: 2s

# ── Kafka topic names ──────────────────────────────────────────────────────
app:
  kafka:
    topics:
      order-events: orders.events.v1
      payment-events: payments.events.v1

# ── Observability ──────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

  tracing:
    sampling:
      probability: 1.0   # 100% sampling — lower in production if needed

  otlp:
    tracing:
      # Port 4318 (HTTP) — NOT 4317 (gRPC)
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}
    metrics:
      export:
        url: ${MANAGEMENT_OTLP_METRICS_URL:http://otel-collector:4318/v1/metrics}

  metrics:
    tags:
      application: ${spring.application.name}

  observations:
    key-values:
      application: ${spring.application.name}

  loki:
    endpoint: ${LOKI_URL:http://loki:3100/loki/api/v1/push}

# ── Logging ────────────────────────────────────────────────────────────────
logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %m%n"
