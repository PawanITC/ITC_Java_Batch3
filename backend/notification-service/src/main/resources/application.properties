spring.application.name=notification-service

# =========================
# SERVER, either use env var SERVER_PORT or 8080
# =========================
server.port=${SERVER_PORT:8080}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#postgres configuration,
#either use env var POSTGRES_HOST (if exists in environment, should exist for docker image only not locally) or default localhost if it doesn't exist
spring.datasource.url=jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/notificationDB
spring.datasource.username= ${POSTGRES_notificationDB_user:postgres}
spring.datasource.password= ${POSTGRES_notificationDB_pass:postgres}
spring.jpa.hibernate.ddl-auto=update
#extra porperties optional
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Twilio credentials (do NOT commit real values)
twilio.account-sid= ${TWILIO_SID}
twilio.auth-token=  ${TWILIO_AUTHTOKEN}
twilio.from-number= ${TWILIO_FROMNUMBER}

# Retry configuration
resilience4j.retry.instances.smsRetry.max-attempts=3
resilience4j.retry.instances.smsRetry.wait-duration=2s

resilience4j.retry.instances.emailRetry.max-attempts=3
resilience4j.retry.instances.emailRetry.wait-duration=2s

# ==============================================================================
# OBSERVABILITY — aligned with the rest of the Funkart microservices
# ==============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# Trace every request (100% sampling) — lower in production if needed
management.tracing.sampling.probability=1.0

# OTLP traces — port 4318 (HTTP), NOT 4317 (gRPC)
management.otlp.tracing.endpoint=${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://otel-collector:4318/v1/traces}

# OTLP metrics — pushed to the same collector
management.otlp.metrics.export.url=${MANAGEMENT_OTLP_METRICS_URL:http://otel-collector:4318/v1/metrics}

# Tag every metric with the service name so Grafana can filter by service
management.metrics.tags.application=${spring.application.name}
management.observations.key-values.application=${spring.application.name}

# Loki log shipping (struct-log compatible)
management.loki.endpoint=${LOKI_URL:http://loki:3100/loki/api/v1/push}

# Include traceId + spanId in every log line for correlated traces
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %m%n

#we have two seperate listener ports for kafka (local 29092 and docker 9092)
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:29092}
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.kafka.topics.order-events=order-events
