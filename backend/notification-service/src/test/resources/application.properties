#properties to be used with test profile in spring, so ideally we want our tests to interact with springs local h2
#database for the puropse of tests and not connect with our actual postgres database

# H2 test database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Optional
spring.h2.console.enabled=true

spring.application.name=notification-service

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

#H2 database properties
#spring.datasource.url=jdbc:h2:mem:testdb
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# Twilio credentials (do NOT commit real values)
twilio.account-sid= ${TWILIO_SID}
twilio.auth-token=  ${TWILIO_AUTHTOKEN}
twilio.from-number= ${TWILIO_FROMNUMBER}

# Retry configuration
resilience4j.retry.instances.smsRetry.max-attempts=3
resilience4j.retry.instances.smsRetry.wait-duration=2s

resilience4j.retry.instances.emailRetry.max-attempts=3
resilience4j.retry.instances.emailRetry.wait-duration=2s

# Expose actuator endpoints, (I added beans for my own research not needed here for tracing/metrics)
management.endpoints.web.exposure.include=health,info,prometheus, beans

# Enable full tracing (for learning/debugging)
management.tracing.sampling.probability=1.0

management.otlp.tracing.endpoint=http://localhost:4318/v1/traces
#management.opentelemetry.tracing.export.otlp.endpoint=http://localhost:4318/v1/traces

# Add service name explicitly (sometimes clearer in Jaeger)
# management.tracing.service-name=notification-service

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer

app.kafka.topics.order-events=order-events
