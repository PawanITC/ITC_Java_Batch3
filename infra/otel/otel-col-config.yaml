extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s

exporters:
  otlp/jaeger:
    endpoint: "jaeger:4317"
    tls:
      insecure: true

  prometheus:
    endpoint: "0.0.0.0:8889"

  loki:
    endpoint: "http://loki:3100/loki/api/v1/push"
    timeout: 10s
    retry_on_failure:
      enabled: true

  logging:
    verbosity: basic

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, logging] # Match the renamed exporter
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, logging] # Added logging to debug metrics
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki, logging]